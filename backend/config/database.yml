default: &default
  adapter: postgresql
  encoding: unicode
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>
  username: <%= ENV.fetch("DB_USERNAME", "") %>
  password: <%= ENV.fetch("DB_PASSWORD", "") %>
  host: <%= ENV.fetch("DB_HOST", "localhost") %>

development:
  <<: *default
  database: rems_development

test:
  <<: *default
  database: rems_test

production:
  <<: *default
  database: rems_production
  username: rems
  password: <%= ENV["REMS_DATABASE_PASSWORD"] %>
